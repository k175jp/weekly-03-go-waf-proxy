services:
  waf-proxy:
    build:
      context: ./waf
    ports:
      - "9000:9000"
    volumes:
      - ./waf:/app
    depends_on:
      backend-app:
        condition: service_healthy

  backend-app:
    build:
      context: ./sample-app
    ports:
      - "8080:8080"
    volumes:
      - ./sample-app:/app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/search?q=healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s